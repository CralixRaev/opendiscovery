name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:

env:
  UV_CACHE_DIR: .uv-cache
  UV_FROZEN: "1"

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    container: ghcr.io/astral-sh/uv:python3.14-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: .uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Run Ruff
        run: uv run ruff check .

  tests:
    name: Tests
    runs-on: ubuntu-latest
    container: ghcr.io/astral-sh/uv:python3.14-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: .uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Run tests
        run: uv run pytest
